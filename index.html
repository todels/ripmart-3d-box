<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ripmart — 3D Box</title>
<style>
  :root { --fg:#111827; --muted:#6b7280; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; overflow:hidden; background:#d4d4d4; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #app { position:fixed; inset:0; background: radial-gradient(ellipse 120% 100% at 50% 20%, #ffffff 0%, #e2e2e2 55%, #c4c4c4 100%); }
  canvas { display:block; }
  .hud { position:fixed; left:24px; top:22px; color:var(--fg); user-select:none; pointer-events:none; }
  .hud h1 { margin:0; font-size:18px; letter-spacing:.04em; font-weight:700; }
  .hud p  { margin:6px 0 0; font-size:13px; color:var(--muted); letter-spacing:.02em; }
  .controls { position:fixed; right:24px; bottom:24px; display:flex; gap:10px; }
  .btn { pointer-events:auto; cursor:pointer; border:1px solid rgba(0,0,0,.15);
    background:rgba(255,255,255,.70); color:var(--fg); padding:10px 16px; border-radius:999px;
    font-size:13px; letter-spacing:.03em; backdrop-filter:blur(8px); transition:.18s; }
  .btn:hover { background:rgba(255,255,255,.90); }
  .btn.active { background:#6b74e0; border-color:#6b74e0; color:#fff; }
  .hint { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); color:var(--muted);
    font-size:12.5px; letter-spacing:.05em; pointer-events:none; }
  .version { position:fixed; right:24px; top:22px; color:var(--muted); font-size:11px; letter-spacing:.06em; pointer-events:none; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:14px; letter-spacing:.06em; }

  /* ── design panel ── */
  #designPanel {
    position:fixed; left:24px; top:64px;
    width:270px;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(14px);
    border:1px solid rgba(0,0,0,.10);
    border-radius:16px;
    padding:18px;
    color:var(--fg);
    font-size:13px;
    box-shadow:0 4px 24px rgba(0,0,0,.12);
    pointer-events:auto;
    user-select:none;
  }
  #designPanel h2 { margin:0 0 14px; font-size:13px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); }
  #dropZone {
    border:2px dashed rgba(0,0,0,.20);
    border-radius:12px; padding:26px 12px;
    text-align:center; color:var(--muted);
    font-size:12px; line-height:1.7;
    cursor:pointer; transition:.15s;
    position:relative;
  }
  #dropZone:hover, #dropZone.drag-over { border-color:#6b74e0; color:#6b74e0; background:rgba(107,116,224,.06); }
  #dropZone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  #faceLog { margin-top:12px; display:flex; flex-direction:column; gap:5px; }
  .face-row {
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(0,0,0,.04); border-radius:8px; padding:6px 10px;
    font-size:11.5px;
  }
  .face-row .fname { font-weight:600; color:var(--fg); }
  .face-row .fstatus { color:var(--muted); font-size:11px; }
  .face-row.matched .fstatus { color:#22c55e; }
  .face-row.unmatched .fstatus { color:#ef4444; }
  #applyMsg { margin-top:10px; font-size:12px; color:#22c55e; text-align:center; min-height:18px; }
</style>
</head>
<body>
<div id="app"></div>
<div class="hud">
  <h1>RIPMART</h1>
  <p>Interactive package · drag to rotate · scroll to zoom</p>
</div>
<div class="controls">
  <button class="btn active" id="spinBtn">Auto‑spin</button>
  <button class="btn" id="resetBtn">Reset view</button>
  <button class="btn" id="labelBtn">Show labels</button>
</div>
<div class="hint">Click + drag &nbsp;·&nbsp; right‑drag to pan &nbsp;·&nbsp; scroll to zoom</div>
<div class="version">v1.5</div>
<div id="loading">Loading box…</div>

<div id="designPanel">
  <h2>Upload Designs</h2>
  <div id="dropZone">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <span>Drop files here or click to browse<br/><small>Name them: Front, Top, Back, Bottom, L, R</small></span>
  </div>
  <div id="faceLog"></div>
  <div id="applyMsg"></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const app = document.getElementById('app');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.1, 100);
const START = new THREE.Vector3(3.2, 3.2, 4.6);
camera.position.copy(START);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
app.appendChild(renderer.domElement);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.5).texture;
scene.environmentIntensity = 0.35;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 0.9);
key.position.set(4, 7, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 30;
key.shadow.camera.left = -6; key.shadow.camera.right = 6;
key.shadow.camera.top = 6; key.shadow.camera.bottom = -6;
key.shadow.bias = -0.0004;
scene.add(key);
const rim = new THREE.DirectionalLight(0x9aa6ff, 0.3);
rim.position.set(-5, 3, -4);
scene.add(rim);

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// box ratio 6 x 4 x 2  (width x depth x height) -> scale /2
const W = 3.0, H = 1.0, D = 2.0;

const TEX = {
  'Front':  'testbox/Front.png',
  'Top':    'testbox/Top.png',
  'Back':   'testbox/Back.png',
  'Bottom': 'testbox/Bottom.png',
  'L':      'testbox/L.png',
  'R':      'testbox/R.png',
};

// Per-face canvas transforms applied before uploading to GPU
// rotation: CW radians, flipX: mirror horizontally (applied after rotation)
const FACE_TRANSFORMS = {
  'L': { rotation: Math.PI/2, flipX: false, flipY: false },
  'R': { rotation: Math.PI/2, flipX: true,  flipY: true  },
};

function canvasTransform(img, rotation, flipX, flipY) {
  const swap = Math.abs(rotation) > 0.01;
  const c = document.createElement('canvas');
  c.width  = swap ? img.height : img.width;
  c.height = swap ? img.width  : img.height;
  const ctx = c.getContext('2d');
  ctx.translate(c.width/2, c.height/2);
  ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);
  ctx.rotate(rotation);
  ctx.drawImage(img, -img.width/2, -img.height/2);
  return c;
}

let pending = 6;
function checkDone(){ if(--pending===0){ const l=document.getElementById('loading'); if(l) l.remove(); } }

function tex(file){
  const tr = FACE_TRANSFORMS[file];
  const m = new THREE.MeshStandardMaterial({ roughness:0.95, metalness:0.0, envMapIntensity:0.15 });
  if (tr) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const t = new THREE.CanvasTexture(canvasTransform(img, tr.rotation, tr.flipX, tr.flipY));
      t.colorSpace = THREE.SRGBColorSpace;
      t.anisotropy = renderer.capabilities.getMaxAnisotropy();
      m.map = t; m.needsUpdate = true;
      checkDone();
    };
    img.onerror = checkDone;
    img.src = TEX[file];
  } else {
    const loader = new THREE.TextureLoader();
    const t = loader.load(TEX[file], checkDone, undefined, checkDone);
    t.colorSpace = THREE.SRGBColorSpace;
    t.anisotropy = renderer.capabilities.getMaxAnisotropy();
    m.map = t;
  }
  return m;
}

const hw = W/2, hh = H/2, hd = D/2;
const box = new THREE.Group();
const faceMeshes = {};

function face(file, w, h, pos, rot, name){
  const m = tex(file);
  const p = new THREE.Mesh(new THREE.PlaneGeometry(w, h), m);
  p.position.set(pos[0], pos[1], pos[2]);
  p.rotation.x = rot[0]; p.rotation.y = rot[1];
  p.castShadow = true; p.receiveShadow = true;
  box.add(p);
  faceMeshes[name] = p;
}

const HP = Math.PI/2;
face('Bottom', W, D, [0, -hh, 0], [ HP, 0], 'Bottom');
face('Back',   W, H, [0, 0, -hd], [ Math.PI, 0], 'Back');
face('Top',    W, D, [0,  hh, 0], [-HP, 0], 'Top');
face('Front',  W, H, [0, 0,  hd], [0, 0], 'Front');
face('R',      D, H, [ hw, 0, 0], [0,  HP], 'R');
face('L',      D, H, [-hw, 0, 0], [0, -HP], 'L');

box.position.y = hh;
scene.add(box);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.ShadowMaterial({ opacity:0.18 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 2.6;
controls.maxDistance = 12;
controls.target.set(0, H/2, 0);
controls.update();

let spin = true;
const spinBtn = document.getElementById('spinBtn');
spinBtn.onclick = () => { spin = !spin; spinBtn.classList.toggle('active', spin); };
document.getElementById('resetBtn').onclick = () => {
  camera.position.copy(START); controls.target.set(0, H/2, 0); controls.update();
};

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function loop(){
  requestAnimationFrame(loop);
  if (spin) box.rotation.y += 0.0045;
  controls.update();
  renderer.render(scene, camera);
}
loop();

// ── face labels ───────────────────────────────────────────────────────────
function makeLabel(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.roundRect(20, 20, c.width-40, c.height-40, 24);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 96px ui-sans-serif, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, c.width/2, c.height/2);
  const t = new THREE.CanvasTexture(c);
  return new THREE.Mesh(
    new THREE.PlaneGeometry(1.4, 0.7),
    new THREE.MeshBasicMaterial({ map:t, transparent:true, depthTest:false })
  );
}

const labelMeshes = [];
const labelDefs = [
  { name:'Front',  pos:[0, 0,  hd+0.01],        rotX:0,        rotY:0 },
  { name:'Back',   pos:[0, 0, -hd-0.01],        rotX:0,        rotY:Math.PI },
  { name:'Top',    pos:[0,  hh+0.01, 0],         rotX:-Math.PI/2, rotY:0 },
  { name:'Bottom', pos:[0, -hh-0.01, 0],         rotX:Math.PI/2,  rotY:0 },
  { name:'R',      pos:[ hw+0.01, 0, 0],         rotX:0,        rotY:Math.PI/2 },
  { name:'L',      pos:[-hw-0.01, 0, 0],         rotX:0,        rotY:-Math.PI/2 },
];
labelDefs.forEach(({ name, pos, rotX, rotY }) => {
  const m = makeLabel(name);
  m.position.set(pos[0], pos[1], pos[2]);
  m.rotation.x = rotX; m.rotation.y = rotY;
  m.visible = false;
  box.add(m);
  labelMeshes.push(m);
});

let labelsOn = false;
document.getElementById('labelBtn').onclick = function() {
  labelsOn = !labelsOn;
  labelMeshes.forEach(m => m.visible = labelsOn);
  this.classList.toggle('active', labelsOn);
};

// ── design panel ──────────────────────────────────────────────────────────
const FACE_KEYS = ['Front', 'Top', 'Back', 'Bottom', 'L', 'R'];

function stemOf(filename) {
  return filename.replace(/\.[^.]+$/, '');
}

function applyFiles(files) {
  const log = document.getElementById('faceLog');
  log.innerHTML = '';
  let matched = 0, unmatched = 0;

  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const stem = stemOf(file.name);
    const key = FACE_KEYS.find(k => k.toLowerCase() === stem.toLowerCase());
    const row = document.createElement('div');
    row.className = 'face-row ' + (key ? 'matched' : 'unmatched');
    row.innerHTML = '<span class="fname">' + stem + '</span><span class="fstatus">' + (key ? '✓ ' + key : '✗ no match') + '</span>';
    log.appendChild(row);

    if (key) {
      matched++;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const tr = FACE_TRANSFORMS[key];
          const source = tr ? canvasTransform(img, tr.rotation, tr.flipX, tr.flipY) : img;
          const t = tr ? new THREE.CanvasTexture(source) : new THREE.Texture(source);
          t.colorSpace = THREE.SRGBColorSpace;
          t.anisotropy = renderer.capabilities.getMaxAnisotropy();
          t.needsUpdate = true;
          const mesh = faceMeshes[key];
          if (mesh) { mesh.material.map = t; mesh.material.needsUpdate = true; }
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    } else {
      unmatched++;
    }
  });

  const msg = document.getElementById('applyMsg');
  if (matched === 0) {
    msg.textContent = 'No files matched face names.'; msg.style.color = '#ef4444';
  } else {
    msg.textContent = matched + ' face' + (matched > 1 ? 's' : '') + ' updated' + (unmatched ? ', ' + unmatched + ' unrecognised' : '') + '.';
    msg.style.color = '#22c55e';
  }
  setTimeout(() => { msg.textContent = ''; }, 4000);
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', e => { if (e.target.files.length) applyFiles(e.target.files); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) applyFiles(e.dataTransfer.files);
});
</script>
</body>
</html>
